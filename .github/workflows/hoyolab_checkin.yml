name: HoYoLAB Genshin Daily Check-In

on:
  schedule:
    # 22:00 UTC = 06:00 MYT (UTC+8) every day
    - cron: "0 22 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests schedule

      - name: Run check-in
        env:
          LTUID_V2:         ${{ secrets.LTUID_V2 }}
          LTOKEN_V2:        ${{ secrets.LTOKEN_V2 }}
        run: python hoyolab_checkin.py --once
